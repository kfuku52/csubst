name: Create GitHub Tag from __version__

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Detect version using AST
        id: get_version
        run: |
          INIT_PATH=csubst/__init__.py
          echo "Reading version from: $INIT_PATH"

          VERSION=$(python3 -c 'import ast, pathlib; tree=ast.parse(pathlib.Path("csubst/__init__.py").read_text()); values=[ast.literal_eval(node.value) for node in ast.walk(tree) if isinstance(node, ast.Assign) and any(getattr(target, "id", None) == "__version__" for target in node.targets)]; print(values[0] if len(values) == 1 else "")')
          PACKAGE=csubst

          if [ -z "$VERSION" ]; then
            echo "❌ __version__ not found in $INIT_PATH"
            exit 1
          fi

          echo "📦 PACKAGE: $PACKAGE"
          echo "📌 VERSION: $VERSION"

          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create tag if not exists
        run: |
          git fetch --tags
          if git rev-parse --verify --quiet "refs/tags/v$VERSION" >/dev/null; then
            echo "✅ Tag v$VERSION already exists. Skipping."
          else
            echo "🏷 Creating new tag v$VERSION"
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi
