name: Build wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  wheels:
    name: ${{ matrix.name }} wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            archs: x86_64
          - name: macOS x86_64
            os: macos-15-intel
            archs: x86_64
          - name: macOS arm64
            os: macos-14
            archs: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      - name: Build binary wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BEFORE_BUILD: "python -m pip install Cython numpy"
          CIBW_TEST_COMMAND: >-
            python -c "import csubst.combination_cy, csubst.omega_cy,
            csubst.parser_iqtree_cy, csubst.recoding_cy,
            csubst.substitution_cy, csubst.substitution_sparse_cy"
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: csubst-${{ matrix.os }}-${{ matrix.archs }}-wheels
          path: wheelhouse/*.whl
