name: Pytest

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            MANIFEST.in

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          for i in 1 2 3; do
            python -m pip install -e . pytest && break
            echo "Dependency install failed (attempt $i). Retrying in 15s..."
            sleep 15
            if [ "$i" = "3" ]; then
              echo "Dependency install failed after 3 attempts."
              exit 1
            fi
          done

      - name: Verify compiled extensions
        run: |
          python -c "import csubst.combination_cy"
          python -c "import csubst.omega_cy"
          python -c "import csubst.parser_iqtree_cy"
          python -c "import csubst.recoding_cy"
          python -c "import csubst.substitution_cy"
          python -c "import csubst.substitution_sparse_cy"

      - name: Run tests
        run: pytest -q

  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            MANIFEST.in

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          for i in 1 2 3; do
            python -m pip install -e . pytest && break
            echo "Dependency install failed (attempt $i). Retrying in 15s..."
            sleep 15
            if [ "$i" = "3" ]; then
              echo "Dependency install failed after 3 attempts."
              exit 1
            fi
          done

      - name: Verify compiled extensions
        run: python -c "import csubst.combination_cy, csubst.omega_cy, csubst.substitution_cy"

      - name: Run parity and performance checks (PGK/PEPC)
        run: |
          python .github/scripts/sites_parity_check.py --output parity_metrics.tsv --workdir parity_runs
          cat parity_metrics.tsv

      - name: Run omega p-value calibration regression (PGK)
        run: |
          python .github/scripts/omega_pvalue_calibration_check.py \
            --output omega_pvalue_calibration_summary.tsv \
            --runtime-output omega_pvalue_calibration_runtime.tsv \
            --workdir /tmp/csubst_omega_pvalue_calibration
          cat omega_pvalue_calibration_summary.tsv
          cat omega_pvalue_calibration_runtime.tsv

      - name: Upload parity metrics artifact
        uses: actions/upload-artifact@v7
        with:
          name: parity-metrics
          path: parity_metrics.tsv

      - name: Upload omega p-value calibration artifact
        uses: actions/upload-artifact@v7
        with:
          name: omega-pvalue-calibration
          path: |
            omega_pvalue_calibration_summary.tsv
            omega_pvalue_calibration_runtime.tsv

  packaging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            MANIFEST.in

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build

      - name: Build source distribution
        run: python -m build --sdist --outdir dist

      - name: Rebuild wheel from source distribution
        run: python -m pip wheel --no-deps dist/csubst-*.tar.gz --wheel-dir dist/from-sdist

      - name: Verify package contents and dependency metadata
        run: python .github/scripts/package_artifact_check.py

      - name: Install and smoke-test the wheel
        run: |
          python -m venv /tmp/csubst-wheel-smoke
          /tmp/csubst-wheel-smoke/bin/python -m pip install dist/from-sdist/csubst-*.whl pytest
          smoke_dir=$(mktemp -d)
          cd "$smoke_dir"
          /tmp/csubst-wheel-smoke/bin/csubst --version
          test -z "$(find . -mindepth 1 -print -quit)"
          /tmp/csubst-wheel-smoke/bin/python -c "import csubst.combination_cy, csubst.omega_cy, csubst.parser_iqtree_cy, csubst.recoding_cy, csubst.substitution_cy, csubst.substitution_sparse_cy"

      - name: Run tests from the source distribution
        run: |
          python -c "import glob, tarfile; tarfile.open(glob.glob('dist/csubst-*.tar.gz')[0]).extractall('/tmp/csubst-sdist-test', filter='data')"
          cd /tmp/csubst-sdist-test/csubst-*
          /tmp/csubst-wheel-smoke/bin/python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Run Ruff
        run: |
          python -m pip install --upgrade ruff mypy
          python -m ruff check csubst tests setup.py .github/scripts
          python -m mypy --ignore-missing-imports csubst/config_types.py csubst/expected_sparse.py csubst/tsv.py

  cython-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build extensions with address and undefined-behavior sanitizers
        env:
          CFLAGS: -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined
          CSUBST_USE_CYTHON: "1"
        run: |
          python -m pip install --upgrade pip setuptools wheel Cython numpy pytest
          python -m pip install --no-build-isolation -e .

      - name: Run randomized sparse parity tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          export LD_PRELOAD="$(gcc -print-file-name=libasan.so)"
          pytest -q tests/test_expected_sparse.py tests/test_substitution_sparse.py tests/test_omega_sparse.py
